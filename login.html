<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - ANIMIU</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Login</h1>
      <p class="auth-sub">Masuk untuk melanjutkan pengalaman menontonmu.</p>
      <form id="loginForm">
        <label>Email</label>
        <input id="loginEmail" type="email" required placeholder="nama@email.com" />
        <label>Password</label>
        <input id="loginPassword" type="password" required minlength="6" placeholder="minimal 6 karakter" />
        <button type="submit">Masuk</button>
      </form>
      <p id="authMessage" class="auth-message"></p>
      <p class="auth-link">Belum punya akun? <a href="signup.html">Sign up</a></p>
      <p class="auth-link"><a href="index.html">Kembali ke Home</a></p>
    </section>
  </main>
  <script src="auth.js"></script>
</body>
</html>
